[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "python -c \"import uvicorn, os; uvicorn.run('app.main:app', host='0.0.0.0', port=int(os.environ.get('PORT', 8000)), log_level='info')\""
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
